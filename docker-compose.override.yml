# Docker Compose override for Windows development
# This file will be automatically merged with docker-compose.yml

services:
  frontend:
    environment:
      # Enable file polling for Windows (fixes HMR issues)
      - NEXT_WEBPACK_USEPOLLING=1
      - WATCHPACK_POLLING=true
      # Additional Windows optimizations
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      # Use bind mounts for better Windows performance
      - type: bind
        source: .
        target: /app
        consistency: cached
      # Named volumes for better performance
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    # Windows-specific networking
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:
  next_cache: 