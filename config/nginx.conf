# Nginx Configuration for Personal Website Production
# Optimized for performance, security, and SSL with CloudFlare

# Main context
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

# Events context
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# HTTP context
http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Security headers (CloudFlare compatible)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # Hide Nginx version
    server_tokens off;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    
    # Block user agents
    map $http_user_agent $blocked_agent {
        ~*nmap 1;
        ~*nikto 1;
        ~*wikto 1;
        ~*sqlmap 1;
        ~*bsqlbf 1;
        ~*w3af 1;
        ~*acunetix 1;
        ~*havij 1;
        ~*appscan 1;
        default 0;
    }
    
    # Upstream for Next.js app
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }
    
    # HTTP server (redirect to HTTPS)
    server {
        listen 80;
        server_name willworkforlunch.com www.willworkforlunch.com;
        
        # Block malicious user agents
        if ($blocked_agent) {
            return 444;
        }
        
        # Let's Encrypt challenge (if not using CloudFlare SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect www to non-www
        if ($host = 'www.willworkforlunch.com') {
            return 301 https://willworkforlunch.com$request_uri;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://willworkforlunch.com$request_uri;
        }
    }
    
    # HTTPS server for willworkforlunch.com
    server {
        listen 443 ssl http2;
        server_name willworkforlunch.com;
        
        # Block malicious user agents
        if ($blocked_agent) {
            return 444;
        }
        
        # SSL configuration (CloudFlare Universal SSL)
        ssl_certificate /etc/nginx/ssl/willworkforlunch.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/willworkforlunch.com/privkey.pem;
        
        # SSL security settings (CloudFlare optimized)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # HSTS (CloudFlare handles this, but adding for extra security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Security: Block access to sensitive files
        location ~ (\.env|\.git|package\.json|package-lock\.json)$ {
            deny all;
            return 404;
        }
        
        # Block common attack patterns
        location ~ (wp-admin|wp-login|xmlrpc\.php) {
            deny all;
            return 404;
        }
        
        # Static file caching (CloudFlare CDN will also cache)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @nextjs;
        }
        
        # Next.js static files
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://nextjs;
        }
        
        # API routes with rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Auth routes with stricter rate limiting
        location ~ ^/api/auth/(signin|signup|register) {
            limit_req zone=login burst=5 nodelay;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # Health check endpoint
        location /api/health {
            access_log off;
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Admin routes (additional security)
        location /admin/ {
            # CloudFlare IP whitelist for admin access (optional)
            # allow 173.245.48.0/20;
            # allow 103.21.244.0/22;
            # allow 103.22.200.0/22;
            # allow 103.31.4.0/22;
            # allow 141.101.64.0/18;
            # allow 108.162.192.0/18;
            # allow 190.93.240.0/20;
            # allow 188.114.96.0/20;
            # allow 197.234.240.0/22;
            # allow 198.41.128.0/17;
            # allow 162.158.0.0/15;
            # allow 104.16.0.0/13;
            # allow 104.24.0.0/14;
            # allow 172.64.0.0/13;
            # allow 131.0.72.0/22;
            # deny all;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # All other requests to Next.js
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Fallback to Next.js
        location @nextjs {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # HTTPS server for www.willworkforlunch.com (redirect to non-www)
    server {
        listen 443 ssl http2;
        server_name www.willworkforlunch.com;
        
        # SSL configuration (same as main domain)
        ssl_certificate /etc/nginx/ssl/willworkforlunch.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/willworkforlunch.com/privkey.pem;
        
        # Redirect www to non-www
        return 301 https://willworkforlunch.com$request_uri;
    }
} 