<!DOCTYPE html>
<html><head><title>Tailwind CSS</title><style>body{margin:0;}</style></head>
<body><svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="400" fill="#06B6D4"/>
    
    <!-- Gradient overlay -->
    <defs>
      <radialGradient id="grad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
        <stop offset="100%" style="stop-color:rgba(0,0,0,0.1);stop-opacity:1" />
      </radialGradient>
    </defs>
    <rect width="600" height="400" fill="url(#grad)"/>
    
    <!-- Icon -->
    <text x="300" y="180" text-anchor="middle" font-size="60" font-family="Arial, sans-serif">🎨</text>
    
    <!-- Title -->
    <text x="300" y="240" text-anchor="middle" font-size="28" font-weight="bold" font-family="Arial, sans-serif" fill="#FFFFFF">Tailwind CSS</text>
    
    <!-- Subtitle -->
    <text x="300" y="270" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#FFFFFF" opacity="0.9">Why I Made the Switch</text>
    
    <!-- Decorative elements -->
    <circle cx="80" cy="80" r="3" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="520" cy="320" r="3" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="550" cy="80" r="2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="50" cy="350" r="2" fill="#FFFFFF" opacity="0.4"/>
  </svg></body></html>
