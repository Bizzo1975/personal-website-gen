<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="currentColor">
  <defs>
    <linearGradient id="hat-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    <linearGradient id="staff-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="magic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="120" cy="120" r="110" fill="#1e293b" />
  
  <!-- Wizard Hat -->
  <path d="M95,35c0,5,1,10,3,14c1,4,2,7,2,10c0,5-4,10-10,10c-4,0-9-3-12-7
  c-3-4-6-8-9-11c-5-6-9-10-9-17c0-8,7-15,15-15h5C88,20,95,27,95,35z" 
  fill="url(#hat-gradient)" stroke="#4c1d95" stroke-width="3" />
  
  <!-- Smoke/Magic from pipe -->
  <path d="M190,89c-2-3-5-5-8-7c-4-2-8-4-12-7c-4-3-7-6-9-10
  c-2-4-3-8-1-12c1-4,4-7,8-9c7-3,15,0,18,7c1,2,1,4,1,6
  c0,3,2,6,5,7c4,1,8-1,9-5c1-4,1-8,0-11c-5-16-23-24-39-19
  c-9,3-15,10-18,19c-3,9-2,18,3,26c3,6,8,11,13,15c4,3,9,6,13,9
  c3,2,5,5,7,8c2,3,2,7,1,11c-1,4-4,6-8,8c-7,3-15,0-18-7
  c-1-2-1-4-1-6c0-3-2-6-5-7c-4-1-8,1-9,5c-1,4-1,8,0,11
  c5,16,23,24,39,19C194,134,201,110,190,89z" 
  fill="url(#magic-gradient)" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Wizard Staff/Wand -->
  <path d="M137,71c-3-3-7-5-11-5c-4,0-8,1-11,5L33,163c-2,2-3,4-3,7
  c0,3,1,5,3,7l30,30c2,2,4,3,7,3c3,0,5-1,7-3l92-82c6-6,6-16,0-22L137,71z
  M65,185L55,175l76-76l10,10L65,185z" 
  fill="url(#staff-gradient)" stroke="#4338ca" stroke-width="3"/>
  
  <!-- Magic Sparkles with animation -->
  <g filter="url(#glow)">
    <path d="M187,27c-4-4-10-4-14,0l-13,13c-4,4-4,10,0,14s10,4,14,0l13-13
    C191,37,191,31,187,27z" 
    fill="#fef3c7" stroke="#fbbf24" stroke-width="2">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
    </path>
    
    <path d="M190,205L190,205c-3-3-7-3-10,0l-20,20c-3,3-3,7,0,10c3,3,7,3,10,0l20-20
    C193,212,193,208,190,205z" 
    fill="#fef3c7" stroke="#fbbf24" stroke-width="2">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
    </path>
    
    <path d="M120,180c-3-3-7-3-10,0l-20,20c-3,3-3,7,0,10c3,3,7,3,10,0l20-20
    C123,187,123,183,120,180z" 
    fill="#fef3c7" stroke="#fbbf24" stroke-width="2">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite" />
    </path>
    
    <path d="M200,140c-3-3-7-3-10,0l-30,30c-3,3-3,7,0,10c3,3,7,3,10,0l30-30
    C203,147,203,143,200,140z" 
    fill="#fef3c7" stroke="#fbbf24" stroke-width="2">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Beard for wizard face hint -->
  <path d="M110,75c0,0,5,10,15,10s15-10,15-10s0,20-15,20S110,75,110,75z" 
  fill="#94a3b8" stroke="#64748b" stroke-width="2" />
  
  <!-- Eyes hint -->
  <circle cx="118" cy="65" r="3" fill="#e2e8f0" />
  <circle cx="132" cy="65" r="3" fill="#e2e8f0" />
</svg> 